name: Crawl mass.gov/orgs/massability

on:
  schedule:
    # 13:00 UTC on the 15th of every month = 09:00 America/New_York during EDT
    # (Note: drifts to 08:00 EST during DST-off months — Nov-Mar. Adjust if that matters.)
    - cron: '0 13 15 * *'
  workflow_dispatch:  # manual trigger from Actions tab

permissions:
  contents: write  # required to commit + push back to main

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firecrawl CLI
        run: npm install -g firecrawl-cli

      - name: Verify Firecrawl credits available
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${FIRECRAWL_API_KEY:-}" ]; then
            echo "::error::FIRECRAWL_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          OUTPUT=$(firecrawl credit-usage 2>&1)
          echo "$OUTPUT"
          REMAINING=$(echo "$OUTPUT" | grep "Remaining Credits:" | grep -oE '[0-9,]+' | head -1 | tr -d ',')
          echo "Remaining credits: ${REMAINING}"
          if [ "${REMAINING:-0}" -lt "300" ]; then
            echo "::error::Insufficient Firecrawl credits (${REMAINING} available, need ≥300). Aborting."
            exit 1
          fi

      - name: Run crawl
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          CONCURRENCY: '5'
          MAP_LIMIT: '500'
          SEARCH_QUERY: massability
        run: node scripts/crawl.mjs

      - name: Build manifest + dedupe
        run: node scripts/refresh-manifest.mjs

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit (manifest unchanged)."
            exit 0
          fi
          PAGE_COUNT=$(node -e "const m=require('./docs/crawl-manifest.json');console.log(m.filter(e=>e.status==='ok').length)")
          LINKED_COUNT=$(node -e "const m=require('./docs/crawl-manifest.json');console.log(m.filter(e=>e.status==='linked').length)")
          git commit -m "data: mass.gov/orgs/massability crawl (${PAGE_COUNT} pages, ${LINKED_COUNT} linked to 509dds-data)

          Auto-generated by .github/workflows/crawl.yml"
          git push origin main
